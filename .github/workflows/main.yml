name: Deploy antelligen-frontend via Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create .env file
        run: echo "NEXT_PUBLIC_API_BASE_URL=http://localhost:33333
NEXT_PUBLIC_AGENT_API_BASE_URL=http://localhost:33333
# OAuth 로그인 경로 (필수)
NEXT_PUBLIC_GOOGLE_LOGIN_PATH=/oauth2/authorization/google
NEXT_PUBLIC_KAKAO_LOGIN_PATH=/api/v1/kakao-authentication/request-oauth-link" > .env

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: minstabb
          password: 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

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/minstabb/antelligen-frontend:latest
          platforms: linux/amd64,linux/arm64

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, antelligen-frontend]

    steps:
      - name: GHCR Login
        run: echo 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 | docker login ghcr.io -u minstabb --password-stdin
    
      - name: Pull latest image
        run: docker pull ghcr.io/minstabb/antelligen-frontend:latest

      - name: Stop old container
        run: |
          docker image prune -f
          docker logout

      - name: Run container
        run: |
          docker-compose up -d

      - name: Health check
        run: |
          sleep 5
          if curl -sSf http://localhost:37123/ > /dev/null; then
            echo "antelligen-frontend is UP"
          else
            echo "Health check failed"
            docker logs antelligen-frontend --tail 200
            exit 1
          fi
